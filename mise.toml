[tasks.setup]
description = "Install local Python dev dependencies"
run = "make dev-deps"

[tasks.test]
description = "Run DSP core smoke tests"
run = "make test"

[tasks.emulator-test]
description = "Run browser emulator smoke tests"
run = "make emulator-test"

[tasks.render]
description = "Render the default demo WAV"
run = "make render"

[tasks.suite]
description = "Render all preset-suite WAVs"
run = "make suite"

[tasks.plot]
description = "Render the suite and generate waveform/spectrum PNGs"
run = "make plot"

[tasks.host]
description = "Build host-only shared library for local compile checks"
run = "make host"

[tasks.move]
description = "Build aarch64 Move-target module package"
run = "make move"

[tasks.wasm]
description = "Build browser WASM synth"
run = "make wasm"

[tasks.serve]
description = "Serve the local browser UI at http://localhost:8765/web/"
run = "make serve"

[tasks.web]
description = "Build WASM and serve the browser UI"
depends = ["wasm"]
run = "make serve"

[tasks.dev]
description = "Build WASM, serve the browser UI, and rebuild WASM when DSP or metadata changes"
run = "make dev"

[tasks.deploy]
description = "Run checked local build steps, then install to Ableton Move"
run = "make deploy"

[tasks.check]
description = "Run the main non-device checks"
depends = ["test", "suite", "plot", "host"]
