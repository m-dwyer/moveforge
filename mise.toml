[tasks.setup]
description = "Install local Python dev dependencies"
run = "make dev-deps"

[tasks.test]
description = "Run DSP core smoke tests"
run = "make test"

[tasks.validate]
description = "Validate module-scoped parameter metadata and mappings"
run = "pnpm run validate"

[tasks.emulator-test]
description = "Run browser emulator smoke tests"
run = "pnpm run emulator-test"

[tasks.render]
description = "Render the default demo WAV"
run = "make render"

[tasks.suite]
description = "Render all preset-suite WAVs"
run = "make suite"

[tasks.plot]
description = "Render the suite and generate waveform/spectrum PNGs"
run = "make plot"

[tasks.metrics]
description = "Render the suite and emit metrics.json next to WAVs"
depends = ["suite"]
run = "pnpm run metrics"

[tasks.check-renders]
description = "Compare current suite metrics against goldens/<module>/metrics.json"
run = "pnpm run check-renders"

[tasks.bless-renders]
description = "Promote current suite metrics into goldens/<module>/metrics.json"
run = "pnpm run bless-renders"

[tasks.new-module]
description = "Scaffold a new Schwung module (usage: mise run new-module -- --id myfx --kind audio_fx)"
run = "pnpm run new-module --"

[tasks.host]
description = "Build host-only shared library for local compile checks"
run = "make host"

[tasks.move]
description = "Build aarch64 Move-target module package"
run = "make move"

[tasks.wasm]
description = "Build browser WASM synth"
run = "make wasm"

[tasks.serve]
description = "Serve the local browser UI at http://localhost:8765/"
run = "pnpm run serve"

[tasks.web]
description = "Build WASM and serve the browser UI"
depends = ["wasm"]
run = "pnpm run serve"

[tasks.dev]
description = "Build browser TypeScript and WASM, serve the browser UI, and rebuild when source files change"
run = "pnpm run dev"

[tasks.deploy]
description = "Run checked local build steps, then install to Ableton Move"
run = "make deploy"

[tasks.move-health]
description = "Check SSH, Schwung paths, disk space, and installed module files on Ableton Move"
run = "make move-health"

[tasks.move-logs]
description = "Tail Schwung debug.log on Ableton Move"
run = "make move-logs"

[tasks.move-cache]
description = "Clear transient Schwung/Move runtime caches on Ableton Move"
run = "make move-cache"

[tasks.move-restart]
description = "Ask Schwung's restart helper to restart Move"
run = "make move-restart"

[tasks.move-screen]
description = "Capture the Move/Schwung screen endpoint with Playwright"
run = "make move-screen"

[tasks.check]
description = "Run the main non-device checks"
run = "make check"

[tasks.check-all]
description = "Run non-device checks for all included modules"
run = "make check-all"

[tasks.clean]
description = "Remove build/, build-host/, dist/, dist-host/, and rendered plots"
run = "make clean"
